name: CI

on:
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, reopened, closed ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Check jobs (code-quality, unit-tests, coverage, screenshot-tests)
  #
  # Run on:  feature → develop PRs (opened, synchronize, reopened)
  # Skip on: the "closed" event (no point checking after a merge)
  #          any PR targeting main (code was already verified on the feature PR
  #          that landed it in develop — re-running adds no new signal)
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/**'
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoFullReport

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/jacocoFullReport/html/
          retention-days: 14

      - name: Upload XML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: build/reports/jacoco/jacocoFullReport/jacocoFullReport.xml
          retention-days: 14

  screenshot-tests:
    name: Screenshot Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compares the rendered composables against the baselines checked in
      # at app/src/test/screenshots/. Any pixel diff fails the build.
      - name: Verify Roborazzi baselines
        run: ./gradlew :app:verifyRoborazziDebug

      # On failure Roborazzi writes per-test diff PNGs; uploading them lets
      # the reviewer see exactly what changed without running the task locally.
      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: |
            app/build/outputs/roborazzi/**
            app/build/reports/roborazzi/**
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Runs whenever ANY PR is merged into main (develop → main, hotfix → main, etc.)
  # Releases always come from main — the head branch does not matter.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Release Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by softprops/action-gh-release to create releases & upload assets
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode debug keystore
        run: |
          mkdir -p KeyStores
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > KeyStores/debugKeystore.jks

      - name: Write keystore.debug.properties
        run: |
          cat > keystore.debug.properties <<EOF
          storeFile=../KeyStores/debugKeystore.jks
          storePassword=${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.DEBUG_KEY_ALIAS }}
          keyPassword=${{ secrets.DEBUG_KEY_PASSWORD }}
          EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with build info
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/brochure-debug-${BUILD_DATE}-${SHORT_SHA}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Debug Build #${{ github.run_number }}"
          body: |
            **Debug build** from `${{ github.event.pull_request.head.ref }}` → `main`

            **PR:** #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Merged at:** ${{ github.event.pull_request.merged_at }}

            > ⬇️ Download the APK from **Assets** below and install it on your Android device.
            > Make sure *Install from unknown sources* is enabled in your device settings.
          files: app/build/outputs/apk/debug/brochure-debug-*.apk
          prerelease: true
