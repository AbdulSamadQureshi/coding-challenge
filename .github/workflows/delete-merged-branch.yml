name: Delete Merged Branch

on:
  pull_request:
    types: [ closed ]

jobs:
  delete-branch:
    name: Delete merged feature branch
    runs-on: ubuntu-latest
    # Only run when the PR was actually merged (not just closed),
    # and never delete develop or main.
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'develop' &&
      github.event.pull_request.head.ref != 'main'
    steps:
      - name: Delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              // Branch may already be deleted (e.g. by GitHub's auto-delete setting)
              console.log(`Could not delete ${branch}: ${error.message}`);
            }
